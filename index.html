<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Eid ul Adha Mubarak | Joyous Celebration</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music -->
  <audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
  </audio>

  <!-- Firework Sound -->
  <audio id="fireSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/firework-burst-01.mp3" type="audio/mpeg">
  </audio>

  <!-- Static Stars Background (no animation) -->
  <div class="stars"></div>

  <!-- Simplified Fireworks -->
  <div class="fireworks-container">
    <div class="fw fw1"></div>
    <div class="fw fw2"></div>
    <div class="fw fw3"></div>
    <div class="fw fw4"></div>
    <div class="fw fw5"></div>
    <div class="fw fw6"></div>
  </div>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- Main Section -->
  <section class="hero">
    
    <!-- DESKTOP LAYOUT -->
    <div class="desktop-layout">
      <div class="girl-left">
        <img src="pose1.1.png" class="girl-img" id="girlLeft" alt="Peace Sign">
      </div>
      
      <div class="greeting-card">
        <h1>🐏 Eid ul Adha Mubarak 🌙</h1>
        <p id="greetingText" class="greeting-message">
          May Allah fill your home with happiness and barakah ✨
        </p>
        <div class="blessing">Sending warm duas to you and your family 💖</div>
      </div>
      
      <div class="girl-right">
        <img src="pose1.png" class="girl-img" id="girlRight" alt="Waving">
      </div>
    </div>

    <!-- MOBILE LAYOUT (stacked vertically) -->
    <div class="mobile-layout">
      <div class="greeting-card-mobile">
        <h1>🐏 Eid ul Adha Mubarak 🌙</h1>
        <p id="greetingTextMobile" class="greeting-message-mobile">
          May Allah fill your home with happiness and barakah ✨
        </p>
        <div class="blessing-mobile">Sending warm duas to you and your family 💖</div>
      </div>
      
      <div class="mobile-girls">
        <img src="pose1.1.png" class="mobile-girl" id="mobileLeft" alt="Peace Sign">
        <img src="pose1.png" class="mobile-girl" id="mobileRight" alt="Waving">
      </div>
    </div>
    
    <!-- Sheep -->
    <div class="sheep-container">
      <img id="sheepImg" class="sheep" alt="Sheep" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='70' fill='%23FFF5E6' stroke='%23D4A373' stroke-width='3'/%3E%3Ccircle cx='70' cy='85' r='18' fill='%23E8D5B5'/%3E%3Ccircle cx='130' cy='85' r='18' fill='%23E8D5B5'/%3E%3Ccircle cx='75' cy='82' r='6' fill='%233D2B1A'/%3E%3Ccircle cx='125' cy='82' r='6' fill='%233D2B1A'/%3E%3Cpath d='M85 110 Q100 125 115 110' stroke='%238B5A2B' fill='none' stroke-width='4'/%3E%3Crect x='80' y='140' width='40' height='30' rx='8' fill='%23C28B5E'/%3E%3Ccircle cx='85' cy='172' r='12' fill='%23A2704A'/%3E%3Ccircle cx='115' cy='172' r='12' fill='%23A2704A'/%3E%3Ctext x='45' y='45' font-size='35' fill='%23FFD966'%3E🐏%3C/text%3E%3C/svg%3E">
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
