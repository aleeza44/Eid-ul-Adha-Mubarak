<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Eid ul Adha Mubarak | Big Festive Fireworks</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music (joyful Eid melody, starts on first user click) -->
  <audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
  </audio>

  <!-- Firework Sound -->
  <audio id="fireSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/firework-burst-01.mp3" type="audio/mpeg">
  </audio>

  <!-- Stars Background -->
  <div class="stars"></div>

  <!-- MEGA FIREWORKS - Bigger and more festive! (20 fireworks) -->
  <div class="firework firework1"></div>
  <div class="firework firework2"></div>
  <div class="firework firework3"></div>
  <div class="firework firework4"></div>
  <div class="firework firework5"></div>
  <div class="firework firework6"></div>
  <div class="firework firework7"></div>
  <div class="firework firework8"></div>
  <div class="firework firework9"></div>
  <div class="firework firework10"></div>
  <div class="firework firework11"></div>
  <div class="firework firework12"></div>
  <div class="firework firework13"></div>
  <div class="firework firework14"></div>
  <div class="firework firework15"></div>
  <div class="firework firework16"></div>
  <div class="firework firework17"></div>
  <div class="firework firework18"></div>
  <div class="firework firework19"></div>
  <div class="firework firework20"></div>

  <!-- Original Fireworks Container (enhanced) -->
  <div class="fireworks"></div>
  <div class="fireworks2"></div>

  <!-- Moon & Lanterns Decor -->
  <div class="moon"></div>
  <div class="lanterns"></div>

  <!-- Floating Clouds -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <!-- Main Section -->
  <section class="hero">
    
    <!-- Top Row: Girls on Left & Right of the Greeting Box -->
    <div class="greeting-row">
      <!-- Left Girl (Pose 2 - Peace Sign) - SWAPPED -->
      <div class="girl-side left-girl">
        <img src="pose1.1.png" class="girl-img girl-left-img" id="girl2" alt="Hijabi Girl Peace Sign">
      </div>
      
      <!-- Center Greeting Box -->
      <div class="content-box" id="contentBox">
        <h1>🐏 Eid ul Adha Mubarak 🌙</h1>
        <h2 id="greeting">
          May Allah fill your home with happiness and barakah ✨
        </h2>
        <p>
          Sending warm duas and blessings to you and your family 💖
        </p>
      </div>
      
      <!-- Right Girl (Pose 1 - Waving) - SWAPPED -->
      <div class="girl-side right-girl">
        <img src="pose1.png" class="girl-img girl-right-img" id="girl1" alt="Hijabi Girl Waving">
      </div>
    </div>
    
    <!-- Bottom Row: Cute Sheep / Goat (BIGGER) -->
    <div class="sheep-bottom">
      <div class="sheep-wrapper">
        <img id="sheepImg" class="sheep-char" alt="Cute Eid Sheep" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='70' fill='%23FFF5E6' stroke='%23D4A373' stroke-width='3'/%3E%3Ccircle cx='70' cy='85' r='18' fill='%23E8D5B5'/%3E%3Ccircle cx='130' cy='85' r='18' fill='%23E8D5B5'/%3E%3Ccircle cx='75' cy='82' r='6' fill='%233D2B1A'/%3E%3Ccircle cx='125' cy='82' r='6' fill='%233D2B1A'/%3E%3Cpath d='M85 110 Q100 125 115 110' stroke='%238B5A2B' fill='none' stroke-width='4' stroke-linecap='round'/%3E%3Crect x='80' y='140' width='40' height='30' rx='8' fill='%23C28B5E'/%3E%3Ccircle cx='85' cy='172' r='12' fill='%23A2704A'/%3E%3Ccircle cx='115' cy='172' r='12' fill='%23A2704A'/%3E%3Ctext x='45' y='45' font-size='35' fill='%23FFD966'%3E🐏%3C/text%3E%3C/svg%3E">
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
